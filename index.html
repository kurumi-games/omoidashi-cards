<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1b2436">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="思い出しカード">
<title>思い出しカード</title>
<style>
  :root{
    --bg:#161d2b;
    --bg-soft:#1b2436;
    --panel:#212c42;
    --panel-2:#27344f;
    --line:#33415f;
    --text:#e6ebf4;
    --muted:#8d9bb8;
    --accent:#6f9be8;
    --accent-soft:#3a4f78;
    --good:#5fae8a;
    --soso:#c8a45a;
    --bad:#c97d7d;
    --radius:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    line-height:1.7;
    min-height:100vh;
    overscroll-behavior-y:none;
  }
  /* 背景画像（固定・全面）。上に薄い暗幕を重ねて文字を読みやすく */
  body::before{
    content:"";
    position:fixed;inset:0;z-index:-1;
    background:linear-gradient(rgba(22,29,43,.55),rgba(22,29,43,.78)),
               url("./bg.jpg") center/cover no-repeat fixed;
  }
  .app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:84px;
  }
  header{
    padding:18px 18px 12px;
    position:sticky;top:0;z-index:10;
    background:linear-gradient(180deg,rgba(22,29,43,.85) 60%,rgba(22,29,43,0));
  }
  h1{font-size:19px;margin:0;font-weight:650;letter-spacing:.04em}
  .sub{color:var(--muted);font-size:12.5px;margin-top:2px}

  /* tabs */
  .tabbar{
    position:fixed;left:0;right:0;bottom:0;z-index:20;
    display:flex;gap:0;
    background:rgba(27,36,54,.88);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border-top:1px solid var(--line);
    max-width:520px;margin:0 auto;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tab{
    flex:1;border:none;background:none;color:var(--muted);
    padding:12px 6px 14px;font-size:12px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  .tab .ic{font-size:20px;line-height:1}
  .tab.active{color:var(--accent)}

  .view{display:none;padding:0 16px;flex:1}
  .view.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* category chips */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 14px;-webkit-overflow-scrolling:touch}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;border:1px solid var(--line);background:var(--panel);
    color:var(--muted);padding:8px 15px;border-radius:999px;font-size:13.5px;cursor:pointer;white-space:nowrap;
  }
  .chip.active{background:var(--accent-soft);border-color:var(--accent);color:#fff}

  /* study card */
  .stage{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:62vh;padding:8px 2px;
  }
  .card{
    width:100%;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:30px 22px;min-height:300px;
    display:flex;flex-direction:column;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
  }
  .card .cat{color:var(--accent);font-size:12px;letter-spacing:.06em;font-weight:600;margin-bottom:14px}
  .card .label{color:var(--muted);font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
  .card .q{font-size:21px;font-weight:600;line-height:1.6}
  .card .divider{height:1px;background:var(--line);margin:20px 0 18px}
  .card .a{font-size:17px;color:#dbe4f3;line-height:1.75;white-space:pre-wrap}
  .card .a.hidden{display:none}

  .counter{color:var(--muted);font-size:12.5px;margin-top:14px;text-align:center}

  /* buttons */
  .btn{
    width:100%;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:600;
    cursor:pointer;color:#fff;background:var(--accent);margin-top:14px;
  }
  .btn:active{transform:scale(.985)}
  .btn.ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--line)}

  .rate{display:flex;gap:10px;margin-top:16px;width:100%}
  .rate button{
    flex:1;border:none;border-radius:14px;padding:15px 4px;font-size:14.5px;font-weight:650;cursor:pointer;color:#10151f;
  }
  .rate .r-bad{background:var(--bad)}
  .rate .r-soso{background:var(--soso)}
  .rate .r-good{background:var(--good)}
  .rate small{display:block;font-weight:500;font-size:11px;opacity:.8;margin-top:2px}

  .empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:15px}

  /* form */
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:7px}
  textarea,select,input{
    width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);
    border-radius:12px;padding:13px;font-size:15.5px;font-family:inherit;resize:vertical;
  }
  textarea:focus,select:focus,input:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:90px}
  select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='none' stroke='%238d9bb8' stroke-width='2'><path d='M3 5l4 4 4-4'/></svg>");background-repeat:no-repeat;background-position:right 14px center}

  /* list */
  .list-item{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:11px;
  }
  .list-item .lcat{color:var(--accent);font-size:11px;font-weight:600;letter-spacing:.05em}
  .list-item .lq{font-size:15px;font-weight:600;margin:3px 0 4px;line-height:1.5}
  .list-item .la{font-size:13px;color:var(--muted);line-height:1.6;white-space:pre-wrap}
  .list-actions{display:flex;gap:8px;margin-top:11px}
  .list-actions button{
    flex:1;border:1px solid var(--line);background:var(--panel-2);color:var(--text);
    border-radius:10px;padding:9px;font-size:13px;cursor:pointer;
  }
  .list-actions .del{color:var(--bad)}
  .pill{display:inline-block;font-size:10.5px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:1px 7px;margin-left:6px}

  /* 画像まわり */
  .imgbtn{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    border-radius:11px;padding:10px 14px;font-size:14px;cursor:pointer;margin-top:2px;
  }
  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .thumb{position:relative;width:72px;height:72px;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:var(--panel)}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .x{
    position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;
    background:rgba(16,21,31,.8);color:#fff;border:none;font-size:14px;line-height:22px;cursor:pointer;text-align:center;padding:0;
  }
  /* 学習・一覧のカード内画像 */
  .card-imgs{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .card-imgs img{max-width:100%;max-height:240px;border-radius:12px;border:1px solid var(--line);cursor:zoom-in}
  .list-imgs{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .list-imgs img{width:54px;height:54px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
  /* 拡大表示 */
  .lightbox{
    position:fixed;inset:0;z-index:100;background:rgba(8,11,17,.92);
    display:none;align-items:center;justify-content:center;padding:20px;
  }
  .lightbox.show{display:flex}
  .lightbox img{max-width:100%;max-height:100%;border-radius:12px}

  .toast{
    position:fixed;left:50%;bottom:96px;transform:translateX(-50%);
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    padding:11px 18px;border-radius:12px;font-size:13.5px;z-index:50;opacity:0;pointer-events:none;
    transition:opacity .2s, transform .2s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
  .row2{display:flex;gap:10px}
  .row2>*{flex:1}
  .set-note{color:var(--muted);font-size:13px;line-height:1.65;margin:6px 0 0}
  .cat-row{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:9px}
  .cat-row .cname{font-size:15px}
  .cat-row .cdel{border:1px solid var(--line);background:var(--panel-2);color:var(--bad);border-radius:9px;padding:7px 14px;font-size:13px;cursor:pointer}
  .cat-row .cfixed{color:var(--muted);font-size:12px}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>思い出しカード</h1>
    <div class="sub" id="headSub">覚えたいことを、クイズで反復する</div>
  </header>

  <!-- 学習 -->
  <section class="view active" id="view-study">
    <div class="chips" id="chips-study"></div>
    <div class="stage" id="stage"></div>
  </section>

  <!-- 追加 -->
  <section class="view" id="view-add">
    <div class="field">
      <label>カテゴリ</label>
      <select id="f-cat"></select>
    </div>
    <div class="field">
      <label>表（問題）</label>
      <textarea id="f-q" placeholder="クイズにしたいものはここ"></textarea>
      <button type="button" class="imgbtn" id="qImgBtn">＋ 写真を追加</button>
      <input type="file" id="qImgInput" accept="image/*" multiple style="display:none">
      <div class="thumbs" id="qThumbs"></div>
    </div>
    <div class="field">
      <label>裏（答え）</label>
      <textarea id="f-a" placeholder="正解の内容はここ"></textarea>
      <button type="button" class="imgbtn" id="aImgBtn">＋ 写真を追加</button>
      <input type="file" id="aImgInput" accept="image/*" multiple style="display:none">
      <div class="thumbs" id="aThumbs"></div>
    </div>
    <button class="btn" id="saveBtn">保存する</button>
    <button class="btn ghost" id="cancelEdit" style="display:none">編集をやめる</button>
  </section>

  <!-- 一覧 -->
  <section class="view" id="view-list">
    <div class="chips" id="chips-list"></div>
    <div id="listWrap"></div>

    <div class="field" style="margin-top:26px">
      <label>カテゴリの管理</label>
      <p class="set-note">カテゴリを追加・削除できます。削除しても中のカードは消えず「その他」に移ります。「その他」は削除できません。</p>
    </div>
    <div class="row2" style="align-items:stretch">
      <input type="text" id="newCatInput" placeholder="新しいカテゴリ名" maxlength="20">
      <button class="btn" id="addCatBtn" style="margin-top:0;flex:0 0 auto;width:auto;padding:13px 18px">追加</button>
    </div>
    <div id="catList" style="margin-top:14px"></div>
  </section>

  <!-- 設定 / バックアップ -->
  <section class="view" id="view-settings">
    <div class="field">
      <label>バックアップ</label>
      <p class="set-note">カードはこの端末のブラウザに保存されています。機種変更・ブラウザのデータ削除・再インストールで消えることがあるので、ときどき書き出しておくと安心です。</p>
    </div>
    <button class="btn" id="exportBtn">JSONで書き出す（エクスポート）</button>
    <button class="btn ghost" id="importBtn">JSONから読み込む（インポート）</button>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none">
    <p class="set-note" id="storeStat"></p>
    <div class="field" style="margin-top:24px">
      <label>このアプリについて</label>
      <p class="set-note">思い出しカード — オフラインでも動くPWA。ホーム画面に追加するとアプリのように使えます。データは端末内に保存され、外部には送信されません。</p>
    </div>
  </section>
</div>

<nav class="tabbar">
  <button class="tab active" data-view="study"><span class="ic">🎯</span>学習</button>
  <button class="tab" data-view="add"><span class="ic">＋</span>追加</button>
  <button class="tab" data-view="list"><span class="ic">📋</span>一覧</button>
  <button class="tab" data-view="settings"><span class="ic">⚙️</span>設定</button>
</nav>

<div class="toast" id="toast"></div>
<div class="lightbox" id="lightbox"><img id="lightboxImg" alt=""></div>

<script>
"use strict";

const STORE = "omoidashi.cards.v1";       // 旧localStorage（移行元）
const CAT_STORE = "omoidashi.cats.v1";
const DB_NAME = "omoidashi-db";
const DB_STORE = "cards";

// 最初から用意しておくカテゴリ。「その他」は土台として常に残す。
const DEFAULT_CATEGORIES = ["勉強","仕事","メモ","その他"];

// 初回だけ入るチュートリアル用カード（使い方が分かるサンプル）
const SAMPLES = [
  { cat:"メモ",
    q:"このアプリは何をするもの？",
    a:"覚えたいことを「クイズ」にして反復するアプリ。おもてに問い、うらに答えを書く。写真も貼れる。問いを見て自分で思い出してから、うらをめくって答え合わせする。" },
  { cat:"メモ",
    q:"覚えた／微妙／忘れた、を選ぶと何が変わる？",
    a:"忘れた・微妙ほど、そのカードがまた早く出てくる。覚えたを選ぶと出にくくなり、たまにだけ復習で出る。苦手なものに自然と多く触れられる。" },
  { cat:"メモ",
    q:"自分のカードはどうやって作る？このサンプルは消せる？",
    a:"下の「追加」タブで、表（問題）と裏（答え）を書いて保存。写真は「＋写真を追加」から。このサンプルは「一覧」タブから削除できる。カテゴリの追加・削除も一覧タブでできる。" },
];

let cards = [];                 // 起動時にDBから読み込む
let CATEGORIES = loadCats();    // 編集できるカテゴリ一覧
let activeCat = "すべて";
let listCat = "すべて";
let current = null;
let editingId = null;

// 追加フォームで一時的に保持する画像（保存時にカードへ移す）
let formQImgs = [];
let formAImgs = [];

function loadCats(){
  try{
    const raw = localStorage.getItem(CAT_STORE);
    if(raw){
      const arr = JSON.parse(raw);
      if(Array.isArray(arr) && arr.length){
        if(!arr.includes("その他")) arr.push("その他");
        return arr;
      }
    }
  }catch(e){}
  try{ localStorage.setItem(CAT_STORE, JSON.stringify(DEFAULT_CATEGORIES)); }catch(e){}
  return DEFAULT_CATEGORIES.slice();
}
function saveCats(){
  try{ localStorage.setItem(CAT_STORE, JSON.stringify(CATEGORIES)); }catch(e){}
}

/* ---------- IndexedDB（写真も入る大容量保存） ---------- */
let _db = null;
function openDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains(DB_STORE)){
        db.createObjectStore(DB_STORE, { keyPath:"id" });
      }
    };
    req.onsuccess = ()=>{ _db = req.result; resolve(_db); };
    req.onerror = ()=>reject(req.error);
  });
}
function dbGetAll(){
  return new Promise((resolve, reject)=>{
    const tx = _db.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).getAll();
    req.onsuccess = ()=>resolve(req.result || []);
    req.onerror = ()=>reject(req.error);
  });
}
function dbPutAll(list){
  return new Promise((resolve, reject)=>{
    const tx = _db.transaction(DB_STORE, "readwrite");
    const os = tx.objectStore(DB_STORE);
    list.forEach(c=>os.put(c));
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
function dbClear(){
  return new Promise((resolve, reject)=>{
    const tx = _db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).clear();
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
function dbDelete(id){
  return new Promise((resolve, reject)=>{
    const tx = _db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}

// メモリ上のcards全体をDBへ同期保存（全消し→入れ直し）
async function save(){
  try{
    await dbClear();
    await dbPutAll(cards);
  }catch(e){ toast("保存できませんでした"); }
}

// 起動時の読み込み＋旧localStorageからの移行
async function bootData(){
  await openDB();
  let loaded = await dbGetAll();

  if(loaded.length === 0){
    // 旧localStorageにデータがあれば移行
    let migrated = null;
    try{
      const raw = localStorage.getItem(STORE);
      if(raw){
        const arr = JSON.parse(raw);
        if(Array.isArray(arr) && arr.length) migrated = arr;
      }
    }catch(e){}
    if(migrated){
      cards = migrated.map(normalizeCard);
      await save();
      try{ localStorage.removeItem(STORE); }catch(e){}  // 移行後は旧データ削除
    }else{
      // まっさら → チュートリアル投入
      cards = SAMPLES.map(s => mkCard(s.cat, s.q, s.a));
      await save();
    }
  }else{
    cards = loaded.map(normalizeCard);
    // 並び順：新しいカードを上にしたいので id 文字列で安定化（追加時 unshift と整合）
  }
}

function normalizeCard(c){
  return {
    id: c.id || (Date.now()+Math.random().toString(16).slice(2,7)),
    cat: c.cat || "その他",
    q: typeof c.q==="string" ? c.q : "",
    a: typeof c.a==="string" ? c.a : "",
    qImgs: Array.isArray(c.qImgs) ? c.qImgs : [],
    aImgs: Array.isArray(c.aImgs) ? c.aImgs : [],
    weight: typeof c.weight==="number" ? c.weight : 6,
    seen: typeof c.seen==="number" ? c.seen : 0,
    order: typeof c.order==="number" ? c.order : Date.now()
  };
}
function mkCard(cat,q,a,qImgs,aImgs){
  return {
    id: Date.now()+Math.random().toString(16).slice(2,7),
    cat, q, a,
    qImgs: qImgs||[], aImgs: aImgs||[],
    weight:6, seen:0,
    order: Date.now()
  };
}

/* ---------- 画像の取り込み・圧縮（ほどほど画質） ---------- */
// 長辺1280px・JPEG品質0.8。data URL文字列で返す。
function fileToCompressedDataURL(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        const MAX = 1280;
        let {width:w, height:h} = img;
        if(w>MAX || h>MAX){
          if(w>=h){ h = Math.round(h*MAX/w); w = MAX; }
          else    { w = Math.round(w*MAX/h); h = MAX; }
        }
        const cv = document.createElement("canvas");
        cv.width=w; cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        try{ resolve(cv.toDataURL("image/jpeg", 0.8)); }
        catch(e){ reject(e); }
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function handleImageFiles(files, targetArr, rerender){
  const list = Array.from(files);
  for(const f of list){
    if(!f.type.startsWith("image/")) continue;
    try{
      const dataUrl = await fileToCompressedDataURL(f);
      targetArr.push(dataUrl);
    }catch(e){ toast("画像を読み込めませんでした"); }
  }
  rerender();
}

function sortedCards(){
  // order降順（新しいものが上）
  return cards.slice().sort((a,b)=>(b.order||0)-(a.order||0));
}

/* ---------- 出題ロジック（シンプルな重み付き抽選） ---------- */
function pool(){
  return activeCat==="すべて" ? cards : cards.filter(c=>c.cat===activeCat);
}
function pick(){
  const p = pool();
  if(p.length===0) return null;
  if(p.length===1) return p[0];
  // 直前と同じカードは避ける
  const candidates = p.filter(c => !current || c.id!==current.id);
  const list = candidates.length ? candidates : p;
  const total = list.reduce((s,c)=>s+Math.max(1,c.weight),0);
  let r = Math.random()*total;
  for(const c of list){
    r -= Math.max(1,c.weight);
    if(r<=0) return c;
  }
  return list[list.length-1];
}
function rate(level){
  if(!current) return;
  // weight更新: 忘れた→出やすく / 微妙→そこそこ / 覚えた→出にくく（でも0にはしない）
  if(level==="bad")  current.weight = Math.min(12, current.weight+4);
  if(level==="soso") current.weight = clamp(current.weight+1, 2, 9);
  if(level==="good") current.weight = Math.max(1, current.weight-3);
  current.seen++;
  save();
  next();
}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

/* ---------- 学習画面 ---------- */
function next(){
  current = pick();
  renderStage();
}
function renderStage(){
  const stage = document.getElementById("stage");
  const p = pool();
  if(p.length===0){
    stage.innerHTML = `<div class="empty">このカテゴリにはまだカードがありません。<br>「追加」から作ってみてください。</div>`;
    return;
  }
  if(!current) current = pick();
  const c = current;
  const qImgsHtml = (c.qImgs&&c.qImgs.length)
    ? `<div class="card-imgs">${c.qImgs.map(src=>`<img src="${src}" class="zoomable" alt="">`).join("")}</div>` : "";
  stage.innerHTML = `
    <div class="card">
      <div class="cat">${esc(c.cat)}</div>
      <div class="label">問題</div>
      <div class="q">${esc(c.q)}</div>
      ${qImgsHtml}
      <div id="answerArea"></div>
    </div>
    <div id="controls" style="width:100%"></div>
    <div class="counter">このカテゴリ ${p.length}枚 ・ このカードを見た回数 ${c.seen}</div>
  `;
  bindZoom(stage);
  showControls(false);
}
function showControls(revealed){
  const ans = document.getElementById("answerArea");
  const ctr = document.getElementById("controls");
  if(!revealed){
    ans.innerHTML = "";
    ctr.innerHTML = `<button class="btn" id="revealBtn">答えを見る</button>`;
    document.getElementById("revealBtn").onclick = ()=>showControls(true);
  }else{
    const aImgsHtml = (current.aImgs&&current.aImgs.length)
      ? `<div class="card-imgs">${current.aImgs.map(src=>`<img src="${src}" class="zoomable" alt="">`).join("")}</div>` : "";
    ans.innerHTML = `<div class="divider"></div><div class="label">答え</div><div class="a">${esc(current.a)}</div>${aImgsHtml}`;
    bindZoom(ans);
    ctr.innerHTML = `
      <div class="rate">
        <button class="r-bad"  data-l="bad">忘れた<small>また出す</small></button>
        <button class="r-soso" data-l="soso">微妙<small>もう一度</small></button>
        <button class="r-good" data-l="good">覚えた<small>たまに出す</small></button>
      </div>`;
    ctr.querySelectorAll(".rate button").forEach(b=>{
      b.onclick = ()=>rate(b.dataset.l);
    });
  }
}

/* ---------- カテゴリチップ ---------- */
function renderChips(){
  const all = ["すべて",...CATEGORIES];
  const make = (containerId, current, onPick)=>{
    const el = document.getElementById(containerId);
    el.innerHTML = "";
    all.forEach(cat=>{
      const b = document.createElement("button");
      b.className = "chip"+(cat===current?" active":"");
      b.textContent = cat;
      b.onclick = ()=>onPick(cat);
      el.appendChild(b);
    });
  };
  make("chips-study", activeCat, cat=>{ activeCat=cat; current=null; renderChips(); renderStage(); });
  make("chips-list",  listCat,  cat=>{ listCat=cat; renderChips(); renderList(); });
}

/* ---------- 追加 / 編集 ---------- */
function fillCatSelect(keep){
  const sel = document.getElementById("f-cat");
  const prev = keep || sel.value;
  sel.innerHTML = CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join("")
    + `<option value="__new__">＋ 新しいカテゴリを作る</option>`;
  // 直前の選択を復元（あれば）
  if(prev && CATEGORIES.includes(prev)) sel.value = prev;
}
// プルダウンで「新しいカテゴリを作る」を選んだ時
function onCatSelectChange(){
  const sel = document.getElementById("f-cat");
  if(sel.value !== "__new__") return;
  const name = (prompt("新しいカテゴリ名を入力") || "").trim();
  if(!name || name==="すべて" || name==="__new__"){
    fillCatSelect(CATEGORIES[0]); // 取り消し→先頭に戻す
    if(name==="すべて") toast("その名前は使えません");
    return;
  }
  if(!CATEGORIES.includes(name)){
    CATEGORIES.push(name);
    saveCats();
    renderChips();
    if(document.getElementById("catList")) renderCatList();
    toast("カテゴリを追加しました");
  }
  fillCatSelect(name);  // 新カテゴリを選択状態に
}
function saveCard(){
  const cat = document.getElementById("f-cat").value;
  const q = document.getElementById("f-q").value.trim();
  const a = document.getElementById("f-a").value.trim();
  if(cat==="__new__"){ toast("カテゴリを選んでください"); return; }
  const hasImg = formQImgs.length || formAImgs.length;
  if(!q && !a && !hasImg){ toast("問題か答えを入力してください"); return; }
  if(editingId){
    const c = cards.find(x=>x.id===editingId);
    if(c){ c.cat=cat; c.q=q; c.a=a; c.qImgs=formQImgs.slice(); c.aImgs=formAImgs.slice(); }
    editingId=null;
    toast("更新しました");
  }else{
    cards.unshift(mkCard(cat,q,a,formQImgs.slice(),formAImgs.slice()));
    toast("追加しました");
  }
  save();
  clearForm();
  renderList();
  if(activeCat==="すべて"||activeCat===cat){ current=null; renderStage(); }
  switchView("list");
}
function clearForm(){
  document.getElementById("f-q").value="";
  document.getElementById("f-a").value="";
  formQImgs = []; formAImgs = [];
  renderThumbs();
  fillCatSelect(CATEGORIES[0]);
  editingId=null;
  document.getElementById("saveBtn").textContent="保存する";
  document.getElementById("cancelEdit").style.display="none";
  document.getElementById("headSub").textContent="覚えたいことを、クイズで反復する";
}
function renderThumbs(){
  const make = (containerId, arr)=>{
    const el = document.getElementById(containerId);
    if(!el) return;
    el.innerHTML = arr.map((src,i)=>`
      <div class="thumb">
        <img src="${src}" alt="">
        <button type="button" class="x" data-i="${i}">×</button>
      </div>`).join("");
    el.querySelectorAll(".x").forEach(b=>{
      b.onclick = ()=>{ arr.splice(Number(b.dataset.i),1); renderThumbs(); };
    });
  };
  make("qThumbs", formQImgs);
  make("aThumbs", formAImgs);
}
function startEdit(id){
  const c = cards.find(x=>x.id===id);
  if(!c) return;
  editingId=id;
  fillCatSelect(c.cat);
  document.getElementById("f-cat").value=c.cat;
  document.getElementById("f-q").value=c.q;
  document.getElementById("f-a").value=c.a;
  formQImgs = (c.qImgs||[]).slice();
  formAImgs = (c.aImgs||[]).slice();
  renderThumbs();
  document.getElementById("saveBtn").textContent="更新する";
  document.getElementById("cancelEdit").style.display="block";
  document.getElementById("headSub").textContent="カードを編集中";
  switchView("add");
  window.scrollTo(0,0);
}
function delCard(id){
  const c = cards.find(x=>x.id===id);
  if(!c) return;
  if(!confirm("このカードを削除しますか？\n\n"+c.q)) return;
  cards = cards.filter(x=>x.id!==id);
  if(current && current.id===id) current=null;
  save();
  renderList();
  renderStage();
  toast("削除しました");
}

/* ---------- 一覧 ---------- */
function renderList(){
  const wrap = document.getElementById("listWrap");
  const base = sortedCards();
  const list = listCat==="すべて" ? base : base.filter(c=>c.cat===listCat);
  if(list.length===0){
    wrap.innerHTML = `<div class="empty">カードがありません。</div>`;
    return;
  }
  wrap.innerHTML = list.map(c=>{
    const imgs = [...(c.qImgs||[]), ...(c.aImgs||[])];
    const imgsHtml = imgs.length
      ? `<div class="list-imgs">${imgs.map(src=>`<img src="${src}" alt="">`).join("")}</div>` : "";
    const qText = c.q ? `<div class="lq">${esc(c.q)}</div>` : `<div class="lq" style="color:var(--muted)">（写真のみ）</div>`;
    const aText = c.a ? `<div class="la">${esc(c.a)}</div>` : "";
    return `
    <div class="list-item">
      <div class="lcat">${esc(c.cat)}<span class="pill">見た ${c.seen}</span></div>
      ${qText}
      ${aText}
      ${imgsHtml}
      <div class="list-actions">
        <button onclick="startEdit('${c.id}')">編集</button>
        <button class="del" onclick="delCard('${c.id}')">削除</button>
      </div>
    </div>`;
  }).join("");
}

/* ---------- タブ切替 ---------- */
function switchView(name){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("view-"+name).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.view===name));
  if(name==="study") renderStage();
  if(name==="list"){ renderList(); renderCatList(); }
  if(name==="settings") updateStoreStat();
  if(name!=="add" && editingId) clearForm();
}

/* ---------- helpers ---------- */
function esc(s){return String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}
function bindZoom(container){
  container.querySelectorAll("img.zoomable").forEach(img=>{
    img.onclick = ()=>{
      const lb = document.getElementById("lightbox");
      document.getElementById("lightboxImg").src = img.src;
      lb.classList.add("show");
    };
  });
}
let toastTimer;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
}

/* ---------- カテゴリ管理 ---------- */
function renderCatList(){
  const el = document.getElementById("catList");
  if(!el) return;
  el.innerHTML = CATEGORIES.map(cat=>{
    const count = cards.filter(c=>c.cat===cat).length;
    if(cat==="その他"){
      return `<div class="cat-row"><span class="cname">${esc(cat)} <span class="cfixed">（${count}枚・削除不可）</span></span></div>`;
    }
    return `<div class="cat-row">
      <span class="cname">${esc(cat)} <span class="cfixed">${count}枚</span></span>
      <button class="cdel" data-cat="${esc(cat)}">削除</button>
    </div>`;
  }).join("");
  el.querySelectorAll(".cdel").forEach(b=>{
    b.onclick = ()=>delCategory(b.dataset.cat);
  });
}
function addCategory(){
  const input = document.getElementById("newCatInput");
  const name = input.value.trim();
  if(!name){ toast("カテゴリ名を入力してください"); return; }
  if(name==="すべて"){ toast("その名前は使えません"); return; }
  if(CATEGORIES.includes(name)){ toast("同じ名前のカテゴリがあります"); return; }
  CATEGORIES.push(name);
  saveCats();
  input.value="";
  renderCatList(); fillCatSelect(); renderChips();
  toast("追加しました");
}
function delCategory(cat){
  if(cat==="その他") return;
  const count = cards.filter(c=>c.cat===cat).length;
  const msg = count>0
    ? `「${cat}」を削除します。\n中の ${count}枚 のカードは「その他」に移ります。\nよろしいですか？`
    : `「${cat}」を削除します。よろしいですか？`;
  if(!confirm(msg)) return;
  // カードを「その他」へ
  cards.forEach(c=>{ if(c.cat===cat) c.cat="その他"; });
  CATEGORIES = CATEGORIES.filter(c=>c!==cat);
  if(activeCat===cat) activeCat="すべて";
  if(listCat===cat) listCat="すべて";
  saveCats(); save();
  current=null;
  renderCatList(); fillCatSelect(); renderChips(); renderStage(); renderList(); updateStoreStat();
  toast("削除しました");
}

/* ---------- エクスポート / インポート ---------- */
function exportJSON(){
  const data = {
    app: "omoidashi-cards",
    version: 1,
    exportedAt: new Date().toISOString(),
    categories: CATEGORIES,
    cards: cards
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const ts = new Date();
  const pad = n=>String(n).padStart(2,"0");
  const name = `omoidashi-${ts.getFullYear()}${pad(ts.getMonth()+1)}${pad(ts.getDate())}-${pad(ts.getHours())}${pad(ts.getMinutes())}.json`;
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast("書き出しました");
}

function importJSON(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    let parsed;
    try{ parsed = JSON.parse(reader.result); }
    catch(e){ toast("読み込めませんでした（JSON不正）"); return; }
    const incoming = Array.isArray(parsed) ? parsed : parsed.cards;
    if(!Array.isArray(incoming)){ toast("カードデータが見つかりません"); return; }

    // カテゴリ復元（あれば）。無ければカードから拾う。「その他」は必ず残す。
    let incomingCats = Array.isArray(parsed.categories) ? parsed.categories.slice() : null;
    if(!incomingCats){
      incomingCats = [];
      incoming.forEach(c=>{ if(c && typeof c.cat==="string" && !incomingCats.includes(c.cat)) incomingCats.push(c.cat); });
    }
    if(!incomingCats.includes("その他")) incomingCats.push("その他");

    // 妥当性チェック＆正規化（カテゴリは復元後の一覧で判定）
    const clean = incoming
      .filter(c => c && (typeof c.q==="string" || typeof c.a==="string" || Array.isArray(c.qImgs) || Array.isArray(c.aImgs)))
      .map(c => ({
        id: c.id || (Date.now()+Math.random().toString(16).slice(2,7)),
        cat: incomingCats.includes(c.cat) ? c.cat : "その他",
        q: typeof c.q==="string" ? c.q : "",
        a: typeof c.a==="string" ? c.a : "",
        qImgs: Array.isArray(c.qImgs) ? c.qImgs : [],
        aImgs: Array.isArray(c.aImgs) ? c.aImgs : [],
        weight: typeof c.weight==="number" ? c.weight : 6,
        seen: typeof c.seen==="number" ? c.seen : 0,
        order: typeof c.order==="number" ? c.order : Date.now()
      }));
    if(clean.length===0){ toast("有効なカードがありません"); return; }

    const ok = confirm(
      `${clean.length}枚のカードを読み込みます。\n\n` +
      `現在の ${cards.length}枚 をすべて置き換えます。\n` +
      `この操作は元に戻せません。よろしいですか？`
    );
    if(!ok){ toast("インポートを中止しました"); return; }

    cards = clean;
    CATEGORIES = incomingCats;
    activeCat = "すべて"; listCat = "すべて";
    current = null; editingId = null;
    saveCats();
    save().then(()=>{
      fillCatSelect(); renderChips(); renderStage(); renderList(); updateStoreStat(); renderCatList();
      switchView("list");
      toast(`${clean.length}枚を読み込みました`);
    });
  };
  reader.onerror = ()=>toast("ファイルを読めませんでした");
  reader.readAsText(file);
}

function updateStoreStat(){
  const el = document.getElementById("storeStat");
  if(!el) return;
  const byCat = {};
  cards.forEach(c=>{ byCat[c.cat]=(byCat[c.cat]||0)+1; });
  const parts = Object.keys(byCat).map(k=>`${k} ${byCat[k]}`).join(" ・ ");
  el.textContent = `現在 ${cards.length}枚` + (parts ? `（${parts}）` : "");
}

/* ---------- service worker 登録 ---------- */
function registerSW(){
  if("serviceWorker" in navigator){
    window.addEventListener("load", ()=>{
      navigator.serviceWorker.register("./sw.js").catch(()=>{});
    });
  }
}

/* ---------- init ---------- */
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>switchView(t.dataset.view));
document.getElementById("saveBtn").onclick=saveCard;
document.getElementById("cancelEdit").onclick=()=>{clearForm();switchView("list");};
document.getElementById("exportBtn").onclick=exportJSON;
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange=(e)=>{
  const f=e.target.files&&e.target.files[0];
  if(f) importJSON(f);
  e.target.value="";
};
document.getElementById("addCatBtn").onclick=addCategory;
document.getElementById("f-cat").onchange=onCatSelectChange;

// 写真ボタン
document.getElementById("qImgBtn").onclick=()=>document.getElementById("qImgInput").click();
document.getElementById("aImgBtn").onclick=()=>document.getElementById("aImgInput").click();
document.getElementById("qImgInput").onchange=(e)=>{
  if(e.target.files&&e.target.files.length) handleImageFiles(e.target.files, formQImgs, renderThumbs);
  e.target.value="";
};
document.getElementById("aImgInput").onchange=(e)=>{
  if(e.target.files&&e.target.files.length) handleImageFiles(e.target.files, formAImgs, renderThumbs);
  e.target.value="";
};

// 拡大表示を閉じる
document.getElementById("lightbox").onclick=()=>{
  document.getElementById("lightbox").classList.remove("show");
  document.getElementById("lightboxImg").src="";
};

// データを読み込んでから画面を描く
fillCatSelect();
bootData().then(()=>{
  renderChips();
  renderStage();
  updateStoreStat();
}).catch(()=>{
  toast("データの読み込みに失敗しました");
});
registerSW();
</script>
