<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f4f6fb">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Retain">
<title>Retain</title>
<style>
  :root{
    --bg-top:#f8faff;
    --bg:#f4f6fb;
    --bg-2:#eaeef7;
    --panel:#ffffff;
    --panel-2:#fbfcfe;
    --line:#dde3ef;
    --text:#2a3347;
    --muted:#7c88a0;
    --accent:#4a7de0;
    --accent-soft:#e3ecfc;
    --green:#2fb673;
    --green-soft:#e2f6ec;
    --red:#d97575;
    --tab-bg:rgba(255,255,255,.92);
    --radius:18px;
    --shadow:0 6px 20px rgba(60,80,130,.10);
  }
  [data-theme="yoru"]{
    --bg-top:#1c2434;
    --bg:#171e2c;
    --bg-2:#121826;
    --panel:#222d44;
    --panel-2:#27334e;
    --line:#35435f;
    --text:#e6ebf4;
    --muted:#93a1bd;
    --accent:#7ba3ec;
    --accent-soft:#2c3d5e;
    --green:#3ec584;
    --green-soft:#1e3c2d;
    --red:#e08a8a;
    --tab-bg:rgba(26,33,49,.92);
    --shadow:0 6px 20px rgba(0,0,0,.35);
  }
  [data-theme="mori"]{
    --bg-top:#f9fbf3;
    --bg:#f3f6ea;
    --bg-2:#e8eed9;
    --panel:#ffffff;
    --panel-2:#fbfdf7;
    --line:#dde6cd;
    --text:#33402e;
    --muted:#87947a;
    --accent:#5a9e6c;
    --accent-soft:#e2f1e5;
    --green:#2fb673;
    --green-soft:#e2f6ec;
    --red:#cf8570;
    --tab-bg:rgba(255,255,255,.92);
    --shadow:0 6px 20px rgba(80,110,70,.10);
  }
  [data-theme="sakura"]{
    --bg-top:#fdf8fa;
    --bg:#faf2f5;
    --bg-2:#f4e5eb;
    --panel:#ffffff;
    --panel-2:#fdf9fb;
    --line:#efdae3;
    --text:#43323c;
    --muted:#a38993;
    --accent:#d9739c;
    --accent-soft:#f9e4ed;
    --green:#2fb673;
    --green-soft:#e2f6ec;
    --red:#d97575;
    --tab-bg:rgba(255,255,255,.92);
    --shadow:0 6px 20px rgba(160,90,120,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:linear-gradient(180deg,var(--bg-top) 0%,var(--bg) 40%,var(--bg-2) 100%) fixed;
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    line-height:1.7;
    min-height:100vh;
    overscroll-behavior-y:none;
  }
  .app{
    max-width:520px;margin:0 auto;min-height:100vh;
    display:flex;flex-direction:column;padding-bottom:88px;
  }
  header{padding:14px 18px 6px}
  .head-row{display:flex;align-items:center;justify-content:space-between}
  h1{font-size:20px;margin:0;font-weight:800;letter-spacing:.05em}
  .head-btns{display:flex;gap:9px}
  .head-btns button{
    width:50px;height:50px;border:none;border-radius:50%;
    font-size:11px;font-weight:700;cursor:pointer;padding:0;line-height:1;
    letter-spacing:-.02em;white-space:nowrap;
    box-shadow:var(--shadow);font-family:inherit;
  }
  .head-btns button:active{transform:scale(.92)}
  #howtoBtn{background:var(--accent-soft);color:var(--accent)}
  #tipsBtn{background:#fdf3d8;color:#b58a35}
  #memoBtn{background:#eee9f8;color:#8a6ac2}
  .sub{color:var(--muted);font-size:13px;margin-top:3px;letter-spacing:.02em;font-weight:500}

  /* tabs */
  .tabbar{
    position:fixed;left:0;right:0;bottom:0;z-index:20;
    display:flex;background:var(--tab-bg);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    max-width:520px;margin:0 auto;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tab{
    flex:1;border:none;background:none;color:var(--muted);
    padding:11px 6px 13px;font-size:12px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;
  }
  .tab .ic{font-size:20px;line-height:1}
  .tab.active{color:var(--accent);font-weight:700}

  .view{display:none;padding:0 16px;flex:1}
  .view.active{display:block;animation:fade .22s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ===== 作成画面 ===== */
  .quiz-btns{display:flex;gap:12px;align-items:center;margin:4px 0 12px}
  .quiz-btns .qn{
    width:52px;height:52px;border-radius:50%;flex:0 0 auto;
    border:2px solid var(--accent);background:var(--panel);color:var(--accent);
    font-size:17px;font-weight:800;cursor:pointer;padding:0;line-height:1;
    box-shadow:var(--shadow);
  }
  .quiz-btns .qn:active{transform:scale(.94);background:var(--accent-soft)}

  .todo-circle{
    width:52px;height:52px;border-radius:50%;flex:0 0 auto;
    border:2px solid var(--green);background:var(--panel);color:transparent;
    font-size:20px;font-weight:800;cursor:pointer;line-height:1;padding:0;
    box-shadow:var(--shadow);
    transition:background .15s,color .15s,box-shadow .15s;
  }
  .todo-circle.on{background:var(--green);color:#fff;box-shadow:0 0 0 4px var(--green-soft)}
  #todoBtn{color:var(--green);font-size:10px;font-weight:800;letter-spacing:0}
  #todoBtn:active{transform:scale(.94);background:var(--green-soft)}
  .quiz-btns .todo-circle{margin-left:auto}
  .todo-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .todo-row .todo-circle{width:36px;height:36px;font-size:16px}
  .todo-label{font-size:13.5px;color:var(--muted);font-weight:600}

  .field{margin-bottom:9px}
  .field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:4px;font-weight:600}
  textarea,input[type=text]{
    width:100%;background:var(--panel);border:1.5px solid var(--line);color:var(--text);
    border-radius:13px;padding:13px;font-size:16px;font-family:inherit;resize:none;
    box-shadow:var(--shadow);
  }
  textarea:focus,input:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:60px}

  .enter-hint{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:11px 9px 10px;margin-bottom:10px;transition:all .15s;
  }
  .enter-hint.ask{background:var(--accent-soft);border-color:var(--accent)}
  .enter-hint.saved{background:var(--green-soft);border-color:var(--green)}
  .steps{display:flex;gap:14px;justify-content:center;align-items:center;margin-bottom:7px}
  .step{
    width:30px;height:30px;border-radius:50%;
    border:2px solid var(--line);background:var(--panel);color:var(--muted);
    font-size:12px;font-weight:800;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s;
  }
  .step.now{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft);transform:scale(1.1)}
  .step.done{border-color:var(--green);background:var(--green);color:#fff}
  .step-text{text-align:center;font-size:13px;color:var(--muted);font-weight:600}
  .save-btn{
    display:block;width:170px;margin:2px auto 0;
    border:none;border-radius:999px;padding:15px;
    font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;
    background:var(--green);color:#fff;box-shadow:var(--shadow);
    transition:transform .1s,box-shadow .2s;
  }
  .save-btn:active{transform:scale(.96)}
  .save-btn.ready{box-shadow:0 0 0 5px var(--green-soft),var(--shadow);animation:pulse 1.2s ease infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  .enter-hint.ask .step-text{color:var(--accent);font-size:14.5px;font-weight:800}
  .enter-hint.saved .step-text{color:var(--green);font-weight:800}

  .imgbtn{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--panel);border:1.5px solid var(--line);color:var(--muted);
    border-radius:10px;padding:6px 11px;font-size:12.5px;cursor:pointer;margin-top:3px;
  }
  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .thumb{position:relative;width:64px;height:64px;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:var(--panel)}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .x{
    position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;
    background:rgba(42,51,71,.75);color:#fff;border:none;font-size:14px;line-height:22px;cursor:pointer;text-align:center;padding:0;
  }

  /* ===== 学習オーバーレイ ===== */
  .study{
    position:fixed;inset:0;z-index:60;background:linear-gradient(180deg,var(--bg-top),var(--bg-2));
    display:none;flex-direction:column;max-width:520px;margin:0 auto;
  }
  .study.show{display:flex}
  .study-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px}
  .study-count{font-size:13.5px;color:var(--muted);font-weight:600}
  .study-actions{display:flex;gap:8px}
  .study-close{
    border:none;background:var(--panel);border-radius:50%;width:36px;height:36px;
    font-size:17px;color:var(--muted);cursor:pointer;box-shadow:var(--shadow);
  }
  .study-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 16px 26px}
  .study-card{
    position:relative;overflow-y:auto;
    width:100%;min-height:64vh;background:var(--panel);
    border:1px solid var(--line);border-radius:22px;
    box-shadow:0 14px 40px rgba(60,80,130,.16);
    padding:46px 22px 30px;cursor:pointer;
    display:flex;flex-direction:column;justify-content:center;
    -webkit-user-select:none;user-select:none;
  }
  .in-counter{
    position:absolute;top:14px;left:17px;
    font-size:13px;color:var(--muted);font-weight:700;
  }
  .in-edit{
    position:absolute;top:9px;right:9px;
    width:40px;height:40px;border:none;border-radius:50%;
    background:var(--bg);font-size:16px;cursor:pointer;padding:0;
  }
  .in-edit:active{background:var(--accent-soft)}
  .in-back{
    position:absolute;top:44px;left:9px;
    width:40px;height:40px;border:none;border-radius:50%;
    background:var(--bg);color:var(--muted);font-size:17px;font-weight:700;cursor:pointer;padding:0;
  }
  .in-back:active{background:var(--accent-soft)}
  .study-card .side-label{color:var(--muted);font-size:11.5px;letter-spacing:.14em;font-weight:700;margin-bottom:10px;text-align:center}
  .study-card .body{font-size:calc(21px*var(--card-fs,1));font-weight:600;line-height:1.65;white-space:pre-wrap;text-align:var(--card-ta,center)}
  .study-card .body.ans{font-size:calc(18px*var(--card-fs,1));font-weight:500}
  .study-card .todo-badge{
    align-self:center;font-size:12px;font-weight:800;color:#fff;background:var(--green);
    border-radius:999px;padding:3px 13px;margin-bottom:12px;
  }
  .study-card .tap-note{color:var(--muted);font-size:12px;text-align:center;margin-top:22px}
  .mini-search{
    display:block;margin:16px auto 0;
    border:1.5px solid var(--line);background:var(--panel);color:var(--muted);
    border-radius:999px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  }
  .mini-search:active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .card-imgs{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;justify-content:center}
  .card-imgs img{max-width:100%;max-height:220px;border-radius:12px;border:1px solid var(--line);cursor:zoom-in}
  .fin-wrap{text-align:center;position:relative;z-index:2}
  .fin-title{font-size:30px;font-weight:800;margin-bottom:6px;animation:finPop .5s cubic-bezier(.2,1.6,.4,1)}
  @keyframes finPop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
  .fin-sub{font-size:14.5px;color:var(--muted);font-weight:600;margin-bottom:26px}
  .fin-again{font-size:12.5px;color:var(--muted);font-weight:700;margin-bottom:10px}
  .fin-btns{display:flex;gap:14px;justify-content:center;margin-bottom:22px}
  .fin-btns .qn{
    width:56px;height:56px;border-radius:50%;border:2px solid var(--accent);
    background:var(--panel);color:var(--accent);font-size:18px;font-weight:800;
    cursor:pointer;padding:0;line-height:1;box-shadow:var(--shadow);
  }
  .fin-btns .qn:active{transform:scale(.94);background:var(--accent-soft)}
  .fin-end{
    border:none;background:none;color:var(--muted);
    font-size:14.5px;font-weight:700;cursor:pointer;
    text-decoration:underline;text-underline-offset:4px;padding:8px 14px;font-family:inherit;
  }
  /* コレクション */
  .col-now-box{display:flex;align-items:center;gap:14px}
  .col-now-box .plant-mini{width:96px;height:110px;flex:0 0 auto}
  .col-now-box .plant-mini svg{width:100%;height:100%}
  .col-now-text{font-size:14px;font-weight:700}
  .col-now-text small{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-top:3px}
  .col-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .col-item{
    background:var(--panel-2);border:1px solid var(--line);border-radius:14px;
    padding:12px 8px 10px;text-align:center;
  }
  .col-item svg{width:84px;height:96px}
  .col-item .cname{font-size:13px;font-weight:800;margin-top:2px}
  .col-item .cdate{font-size:10.5px;color:var(--muted);font-weight:600}
  .col-item .cstars{font-size:11px;color:#f2b73c;letter-spacing:.1em}
  .col-item.locked svg{filter:brightness(0);opacity:.16}
  .col-item.locked .cname{color:var(--muted);letter-spacing:.2em}
  .col-item .ccount{
    display:inline-block;font-size:11px;font-weight:800;color:#fff;
    background:var(--green);border-radius:999px;padding:1px 9px;margin-left:5px;vertical-align:middle;
  }

  /* 植物 */
  .plant-box{width:150px;height:170px;margin:0 auto 4px}
  .plant-box svg{width:100%;height:100%;display:block}
  .plant-stat{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:18px}
  .plant-stat b{color:var(--green)}
  .plant-pick{margin-bottom:20px}
  .plant-pick .pick-title{font-size:13.5px;font-weight:800;margin-bottom:10px}
  .pick-btns{display:flex;flex-direction:column;gap:8px;max-width:250px;margin:0 auto}
  .pick-btns button{
    border:1.5px solid var(--line);background:var(--panel);color:var(--text);
    border-radius:12px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
    display:flex;justify-content:space-between;align-items:center;
  }
  .pick-btns button small{color:var(--muted);font-weight:600;font-size:11.5px}
  .pick-btns button:active{background:var(--green-soft);border-color:var(--green)}

  /* 開花演出 */
  .bloom-stage{position:relative;width:150px;margin:0 auto}
  .bloom-glow{
    position:absolute;inset:-24px;border-radius:50%;
    background:radial-gradient(circle, rgba(242,183,60,.55), rgba(242,183,60,0) 70%);
    opacity:0;transform:scale(.4);pointer-events:none;
  }
  .bloom-glow.burst{animation:glowBurst 1.5s ease-out forwards}
  @keyframes glowBurst{0%{opacity:0;transform:scale(.4)}25%{opacity:1}100%{opacity:0;transform:scale(2)}}
  .plant-box.bounce{animation:bounceP .75s cubic-bezier(.2,1.8,.4,1)}
  @keyframes bounceP{0%{transform:scale(1)}40%{transform:scale(1.16)}100%{transform:scale(1)}}
  .reveal-pop{display:inline-block;animation:finPop .5s cubic-bezier(.2,1.6,.4,1)}
  .fade-in{animation:fade .6s ease}

  /* 紙吹雪 */
  .confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none;border-radius:22px;z-index:1}
  .confetti i{
    position:absolute;top:-12px;width:9px;height:9px;border-radius:2px;
    animation:confFall linear forwards;
  }
  @keyframes confFall{
    to{transform:translateY(80vh) rotate(720deg);opacity:0}
  }

  /* ===== 一覧 ===== */
  .list-item{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:13px 15px;margin-bottom:10px;box-shadow:var(--shadow);
  }
  .list-item .lq{font-size:15px;font-weight:600;line-height:1.5}
  .list-item .la{font-size:13px;color:var(--muted);line-height:1.6;white-space:pre-wrap;margin-top:3px}
  .list-item .ltodo{
    display:inline-block;font-size:10.5px;font-weight:800;color:#fff;background:var(--green);
    border-radius:999px;padding:1px 9px;margin-bottom:4px;
  }
  .list-imgs{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .list-imgs img{width:50px;height:50px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
  .list-actions{display:flex;gap:8px;margin-top:10px}
  .list-actions button{
    flex:1;border:1px solid var(--line);background:var(--panel);color:var(--text);
    border-radius:10px;padding:8px;font-size:13px;cursor:pointer;
  }
  .list-actions .del{color:var(--red)}
  .empty{text-align:center;color:var(--muted);padding:56px 20px;font-size:15px}

  /* ===== 編集モーダル ===== */
  .modal{
    position:fixed;inset:0;z-index:70;background:rgba(42,51,71,.35);
    display:none;align-items:flex-end;justify-content:center;
  }
  .modal.show{display:flex}
  .modal-body{
    width:100%;max-width:520px;max-height:88vh;overflow-y:auto;
    background:var(--bg);border-radius:22px 22px 0 0;padding:18px 16px 26px;
  }
  .modal-title{font-size:16px;font-weight:700;margin:0 0 12px}
  .btn{
    width:100%;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;
    cursor:pointer;color:#fff;background:var(--accent);margin-top:12px;box-shadow:var(--shadow);
  }
  .btn:active{transform:scale(.985)}
  .btn.ghost{background:var(--panel);color:var(--text);border:1.5px solid var(--line)}
  .btn.danger{background:var(--panel);color:var(--red);border:1.5px solid var(--red)}

  /* ===== 設定 ===== */
  .set-block{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px;box-shadow:var(--shadow)}
  .seg{display:flex;gap:8px;margin-top:4px}
  .seg button{
    flex:1;border:1.5px solid var(--line);background:var(--panel);color:var(--muted);
    border-radius:999px;padding:9px 4px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  }
  .seg button.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .seg-label{font-size:12.5px;color:var(--muted);font-weight:700;margin:10px 0 2px}
  .set-block h3{margin:0 0 6px;font-size:14.5px}
  .set-note{color:var(--muted);font-size:13px;line-height:1.65;margin:0 0 8px}
  .row2{display:flex;gap:10px}
  .row2>*{flex:1}

  /* 拡大表示 */
  .lightbox{
    position:fixed;inset:0;z-index:100;background:rgba(20,26,40,.92);
    display:none;align-items:center;justify-content:center;padding:20px;
  }
  .lightbox.show{display:flex}
  .lightbox img{max-width:100%;max-height:100%;border-radius:12px}

  .toast{
    position:fixed;left:50%;bottom:98px;transform:translateX(-50%);
    background:#2a3347;color:#fff;
    padding:11px 18px;border-radius:12px;font-size:13.5px;z-index:110;opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;box-shadow:0 8px 24px rgba(0,0,0,.25);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="head-row">
      <h1>Retain</h1>
      <div class="head-btns">
        <button id="howtoBtn">使い方</button>
        <button id="tipsBtn">コツ</button>
        <button id="memoBtn">メモ</button>
      </div>
    </div>
    <div class="sub">アウトプットしないと、ぜんぶ忘れる。</div>
  </header>

  <!-- ===== 作成 ===== -->
  <section class="view active" id="view-create">
    <div class="quiz-btns">

<script>
"use strict";

const DB_NAME = "omoidashi-db";
const DB_STORE = "cards";

let cards = [];
let formQImgs = [];
let formAImgs = [];
let formTodo = false;

/* ---------- IndexedDB ---------- */
let _db = null;
function openDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains(DB_STORE)){
        db.createObjectStore(DB_STORE, { keyPath:"id" });
      }
    };
    req.onsuccess = ()=>{ _db = req.result; resolve(_db); };
    req.onerror = ()=>reject(req.error);
  });
}
function dbGetAll(){
  return new Promise((resolve, reject)=>{
    const tx = _db.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).getAll();
    req.onsuccess = ()=>resolve(req.result || []);
    req.onerror = ()=>reject(req.error);
  });
}
function dbPutAll(list){
  return new Promise((resolve, reject)=>{
    const tx = _db.transaction(DB_STORE, "readwrite");
    const os = tx.objectStore(DB_STORE);
    list.forEach(c=>os.put(c));
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
function dbClear(){
  return new Promise((resolve, reject)=>{
    const tx = _db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).clear();
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
async function save(){
  try{
    await dbClear();
    await dbPutAll(cards);
  }catch(e){ toast("保存できませんでした"); }
}

async function bootData(){
  await openDB();
  const loaded = await dbGetAll();
  cards = loaded.map(normalizeCard);
}

function normalizeCard(c){
  return {
    id: c.id || (Date.now()+Math.random().toString(16).slice(2,7)),
    q: typeof c.q==="string" ? c.q : "",
    a: typeof c.a==="string" ? c.a : "",
    qImgs: Array.isArray(c.qImgs) ? c.qImgs : [],
    aImgs: Array.isArray(c.aImgs) ? c.aImgs : [],
    todo: !!c.todo,
    order: typeof c.order==="number" ? c.order : Date.now()
  };
}
function mkCard(q,a,qImgs,aImgs,todo){
  return {
    id: Date.now()+Math.random().toString(16).slice(2,7),
    q, a,
    qImgs: qImgs||[], aImgs: aImgs||[],
    todo: !!todo,
    order: Date.now()
  };
}

/* ---------- 画像圧縮 ---------- */
function fileToCompressedDataURL(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        const MAX = 1280;
        let {width:w, height:h} = img;
        if(w>MAX || h>MAX){
          if(w>=h){ h = Math.round(h*MAX/w); w = MAX; }
          else    { w = Math.round(w*MAX/h); h = MAX; }
        }
        const cv = document.createElement("canvas");
        cv.width=w; cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        try{ resolve(cv.toDataURL("image/jpeg", 0.8)); }
        catch(e){ reject(e); }
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function handleImageFiles(files, targetArr, rerender){
  const list = Array.from(files);
  for(const f of list){
    if(!f.type.startsWith("image/")) continue;
    try{
      const dataUrl = await fileToCompressedDataURL(f);
      targetArr.push(dataUrl);
    }catch(e){ toast("画像を読み込めませんでした"); }
  }
  rerender();
}

/* ---------- 共通 ---------- */
function esc(s){
  return String(s).replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));

function toast(msg){
  const t=document.getElementById("toast");

/* ---------- 作成フロー（Enterで進む） ---------- */

/* ---------- サウンド（Web Audio・静かな上質系） ---------- */
let _ac = null;
let _noiseBuf = null;
function ac(){
  if(!_ac){
    try{ _ac = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; }
  }
  if(_ac.state==="suspended") _ac.resume();
  return _ac;
}
// ノイズバッファ（ティック音の素材）
function noiseBuf(ctx){
  if(_noiseBuf) return _noiseBuf;
  const len = ctx.sampleRate * 0.1;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
  _noiseBuf = buf;
  return buf;
}
// こもったティック音（UIタップ）。freqで質感が変わる
function tick(freq=1400, vol=0.20, dur=0.045, delay=0, q=1.6){
  const ctx = ac(); if(!ctx) return;
  const t = ctx.currentTime + delay;
  const src = ctx.createBufferSource();
  src.buffer = noiseBuf(ctx);
  const bp = ctx.createBiquadFilter();
  bp.type = "bandpass"; bp.frequency.value = freq; bp.Q.value = q;
  const g = ctx.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  src.connect(bp); bp.connect(g); g.connect(ctx.destination);
  src.start(t); src.stop(t+dur+0.02);
}
// マリンバ風の丸い音（角がない）。基音＋控えめな倍音、ローパスで艶を出す
function marimba(freq, delay=0, vol=0.16, dur=0.5){
  const ctx = ac(); if(!ctx) return;
  const t = ctx.currentTime + delay;
  const lp = ctx.createBiquadFilter();
  lp.type = "lowpass"; lp.frequency.value = freq*3.2;
  const master = ctx.createGain();
  master.gain.setValueAtTime(0, t);
  master.gain.linearRampToValueAtTime(vol, t+0.006);
  master.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  lp.connect(master); master.connect(ctx.destination);
  [[1,1],[4,0.10]].forEach(([mul,amp])=>{
    const o = ctx.createOscillator();
    o.type = "sine"; o.frequency.value = freq*mul;
    const g = ctx.createGain(); g.gain.value = amp;
    o.connect(g); g.connect(lp);
    o.start(t); o.stop(t+dur+0.05);
  });
}
// 柔らかいパッド和音（ゆっくり立ち上がってふわっと消える）
function pad(freqs, delay=0, vol=0.05, dur=2.2){
  const ctx = ac(); if(!ctx) return;
  const t = ctx.currentTime + delay;
  const lp = ctx.createBiquadFilter();
  lp.type = "lowpass"; lp.frequency.value = 1600;
  const master = ctx.createGain();
  master.gain.setValueAtTime(0, t);
  master.gain.linearRampToValueAtTime(vol, t+0.5);
  master.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  lp.connect(master); master.connect(ctx.destination);
  freqs.forEach(f=>{
    [-3,3].forEach(det=>{           // 軽いデチューンで厚みを出す
      const o = ctx.createOscillator();
      o.type = "triangle"; o.frequency.value = f; o.detune.value = det;
      const g = ctx.createGain(); g.gain.value = 0.5;
      o.connect(g); g.connect(lp);
      o.start(t); o.stop(t+dur+0.1);
    });
  });
}
// ウッドブロック：コンッという短い共鳴＋クリック（採用：C系統）
function wood(freq=820, delay=0, vol=0.22, dur=0.09){
  const ctx = ac(); if(!ctx) return;
  const t = ctx.currentTime + delay;
  const o = ctx.createOscillator(); o.type="triangle"; o.frequency.value=freq;
  const f = ctx.createBiquadFilter(); f.type="bandpass"; f.frequency.value=freq; f.Q.value=9;
  const g = ctx.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.connect(f); f.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t+dur+0.05);
  tick(freq*2.2, vol*0.5, 0.02, delay, 3);
}
const sTap   = ()=>wood(880);                                   // 出題開始・軽い操作
const sFlip  = ()=>wood(700);                                   // カードめくり
const sNext  = ()=>wood(880);                                   // 次のカードへ
const sTodo  = ()=>wood(760);                                   // やること切替
const sSave  = ()=>{ wood(660,0,0.2); wood(990,0.09,0.18); };   // コン・コン↑
const sClear = ()=>{                                            // 木のアルペジオ＋淡い和音

};

};
const PLANT_ORDER = Object.keys(PLANTS);
const RAR_W = { 1:30, 2:13, 3:5, 4:1.2 };   // レアほど出にくい

// ---- 描画部品 ----
function _stem(x, gy, h, w=4, col="#5aa86d", bend=0){
  return `<path d="M${x} ${gy} Q ${x+bend} ${gy-h/2} ${x} ${gy-h}" stroke="${col}" stroke-width="${w}" fill="none" stroke-linecap="round"/>`;
}
function _leaves(x, gy, ls, col="#6cb47e"){
  return `<path d="M${x} ${gy-18} Q ${x-26*ls} ${gy-26} ${x-30*ls} ${gy-44*ls-8}" stroke="${col}" stroke-width="5" fill="none" stroke-linecap="round"/>` +
         `<path d="M${x} ${gy-26} Q ${x+24*ls} ${gy-36} ${x+27*ls} ${gy-50*ls-10}" stroke="${col}" stroke-width="5" fill="none" stroke-linecap="round"/>`;
}

// r=0〜1 の成長度でSVGを描く
function plantSVG(type, r){
  r = Math.max(0, Math.min(1, r));
  const W=150, H=170, GY=150;
  const ground = `<ellipse cx="75" cy="${GY}" rx="52" ry="9" fill="#e6eedd"/>`;
  let body = "";

  if(type==="tulip"){
    const h = 12 + 100*r, top = GY - h;
    body += _stem(75, GY, h, 4);
    if(r>0.22) body += _leaves(75, GY, Math.min(1,(r-0.22)/0.3));
    if(r>0.5){
      const fs = Math.min(1,(r-0.5)/0.45), fw=8+12*fs, fh=12+14*fs, open=r>0.92?6:0;
      body += `<ellipse cx="75" cy="${top-fh*0.5}" rx="${fw}" ry="${fh}" fill="#e0674a"/>`;
      body += `<ellipse cx="${75-fw*0.55-open}" cy="${top-fh*0.45}" rx="${fw*0.62}" ry="${fh*0.85}" fill="#e8836a"/>`;
      body += `<ellipse cx="${75+fw*0.55+open}" cy="${top-fh*0.45}" rx="${fw*0.62}" ry="${fh*0.85}" fill="#e8836a"/>`;
    }
  }

  if(type==="tanpopo"){
    const h = 10 + 70*r, top = GY - h;
    // ぎざぎざ葉っぱ（地面ちかく）
    if(r>0.1){
      const ls = Math.min(1,(r-0.1)/0.3);
      body += `<path d="M75 ${GY-4} L${75-14*ls} ${GY-8} L${75-20*ls} ${GY-16*ls-4} L${75-8*ls} ${GY-12}" fill="#6cb47e"/>`;
      body += `<path d="M75 ${GY-4} L${75+14*ls} ${GY-8} L${75+20*ls} ${GY-16*ls-4} L${75+8*ls} ${GY-12}" fill="#6cb47e"/>`;
    }
    body += _stem(75, GY, h, 3.5);
    if(r>0.5){
      const fs = Math.min(1,(r-0.5)/0.45), fr = 5+9*fs;
      for(let k=0;k<12;k++){
        const a = k*Math.PI/6;
        body += `<ellipse cx="${75+Math.cos(a)*fr}" cy="${top+Math.sin(a)*fr}" rx="${fr*0.5}" ry="${fr*0.24}" fill="#f2d04c" transform="rotate(${k*30} ${75+Math.cos(a)*fr} ${top+Math.sin(a)*fr})"/>`;
      }
      body += `<circle cx="75" cy="${top}" r="${fr*0.55}" fill="#e8a33c"/>`;
    }
  }

  if(type==="cosmos"){
    const n = Math.min(5, 1+Math.floor(r*5));
    const xs = [75, 52, 98, 38, 112];
    for(let i=0;i<n;i++){
      const local = Math.min(1, r*5 - i);
      const h = 20 + 80*local*(1 - i*0.09);
      const x = xs[i], top = GY - h;
      body += _stem(x, GY, h, 3, "#6cb47e", (i%2?8:-8));
      if(local>0.55){
        const fr = 4+5*Math.min(1,(local-0.55)/0.4);
        for(let k=0;k<8;k++){
          const a = k*Math.PI/4;
          body += `<ellipse cx="${x+Math.cos(a)*fr}" cy="${top+Math.sin(a)*fr}" rx="${fr*0.55}" ry="${fr*0.34}" fill="#e88bb0" transform="rotate(${k*45} ${x+Math.cos(a)*fr} ${top+Math.sin(a)*fr})"/>`;
        }
        body += `<circle cx="${x}" cy="${top}" r="${fr*0.45}" fill="#f2b73c"/>`;
      }
    }
  }

  if(type==="himawari"){
    const h = 14 + 100*r, top = GY - h;
    body += _stem(75, GY, h, 6, "#4e9a63");
    if(r>0.2) body += _leaves(75, GY, Math.min(1,(r-0.2)/0.35), "#5aa86d");
    if(r>0.55){
      const fs = Math.min(1,(r-0.55)/0.4), fr = 6+14*fs;
      for(let k=0;k<12;k++){
        const a = k*Math.PI/6;
        body += `<ellipse cx="${75+Math.cos(a)*fr}" cy="${top+Math.sin(a)*fr}" rx="${fr*0.62}" ry="${fr*0.3}" fill="#f2b73c" transform="rotate(${k*30} ${75+Math.cos(a)*fr} ${top+Math.sin(a)*fr})"/>`;
      }
      body += `<circle cx="75" cy="${top}" r="${fr*0.62}" fill="#8a6a4f"/>`;
    }
  }

  if(type==="lavender"){
    const n = Math.min(5, 1+Math.floor(r*5));
    const xs = [75, 56, 94, 44, 106];
    for(let i=0;i<n;i++){
      const local = Math.min(1, r*5 - i);
      const h = 24 + 78*local*(1 - i*0.08);
      const x = xs[i], top = GY - h;
      body += _stem(x, GY, h, 2.6, "#7aa06c", (i%2?5:-5));
      if(local>0.5){
        const sp = Math.min(1,(local-0.5)/0.45);
        const segs = Math.max(1, Math.round(5*sp));
        for(let k=0;k<segs;k++){
          body += `<ellipse cx="${x}" cy="${top+k*6}" rx="${4.5}" ry="${3.4}" fill="#9a6ae0"/>`;
          body += `<ellipse cx="${x-4}" cy="${top+k*6+2.5}" rx="3.4" ry="2.6" fill="#ad84e8"/>`;
          body += `<ellipse cx="${x+4}" cy="${top+k*6+2.5}" rx="3.4" ry="2.6" fill="#ad84e8"/>`;
        }
      }
    }
  }

  if(type==="ajisai"){
    // こんもり茂って、まるい花のかたまりが咲く
    const bs = Math.min(1, r/0.5);
    body += `<circle cx="75" cy="${GY-14*bs-4}" r="${8+20*bs}" fill="#6cb47e"/>`;
    body += `<circle cx="${75-20*bs}" cy="${GY-10*bs-4}" r="${6+15*bs}" fill="#7fbb8b"/>`;
    body += `<circle cx="${75+20*bs}" cy="${GY-10*bs-4}" r="${6+15*bs}" fill="#7fbb8b"/>`;
    if(r>0.5){
      const fs = Math.min(1,(r-0.5)/0.45);
      const balls = [[75, GY-46*fs-14, 14+8*fs, "#8aa5e8"],[75-26*fs, GY-32*fs-12, 11+6*fs, "#a08ae8"],[75+26*fs, GY-34*fs-12, 12+6*fs, "#8ab8e8"]];
      balls.forEach(([bx,by,br,col])=>{
        body += `<circle cx="${bx}" cy="${by}" r="${br}" fill="${col}"/>`;
        for(let k=0;k<7;k++){
          const a = Math.PI*2*k/7;
          body += `<circle cx="${bx+Math.cos(a)*br*0.62}" cy="${by+Math.sin(a)*br*0.62}" r="${br*0.3}" fill="#fff" opacity="0.5"/>`;
        }
      });
    }
  }

  if(type==="bara"){
    const h = 14 + 92*r, top = GY - h;
    body += _stem(75, GY, h, 4.5, "#4e8a58");
    // とげ
    if(r>0.3){
      const ts = Math.min(1,(r-0.3)/0.3);
      [0.3,0.55,0.75].forEach((f,i)=>{
        const y = GY - h*f;
        body += `<path d="M75 ${y} l${(i%2?7:-7)*ts} -4" stroke="#4e8a58" stroke-width="3" stroke-linecap="round"/>`;
      });
    }
    if(r>0.25) body += _leaves(75, GY, Math.min(1,(r-0.25)/0.35), "#4e8a58");
    if(r>0.55){
      const fs = Math.min(1,(r-0.55)/0.4), fr = 6+11*fs;
      body += `<circle cx="75" cy="${top}" r="${fr}" fill="#c94b5e"/>`;
      body += `<circle cx="${75-fr*0.28}" cy="${top-fr*0.18}" r="${fr*0.66}" fill="#de6a7c"/>`;
      body += `<circle cx="${75+fr*0.22}" cy="${top+fr*0.12}" r="${fr*0.42}" fill="#c94b5e"/>`;
      body += `<circle cx="75" cy="${top}" r="${fr*0.2}" fill="#a83648"/>`;
    }
  }

  if(type==="sakura"){
    const th = 20 + 85*r, tw = 5 + 7*r;
    body += `<path d="M75 ${GY} L75 ${GY-th}" stroke="#8a6a4f" stroke-width="${tw}" stroke-linecap="round"/>`;
    if(r>0.25){
      const bs = Math.min(1,(r-0.25)/0.4);
      body += `<path d="M75 ${GY-th*0.62} Q ${75-22*bs} ${GY-th*0.72} ${75-30*bs} ${GY-th*0.88}" stroke="#8a6a4f" stroke-width="${tw*0.55}" fill="none" stroke-linecap="round"/>`;
      body += `<path d="M75 ${GY-th*0.5} Q ${75+20*bs} ${GY-th*0.62} ${75+28*bs} ${GY-th*0.8}" stroke="#8a6a4f" stroke-width="${tw*0.55}" fill="none" stroke-linecap="round"/>`;
    }
    if(r>0.4){
      const cs = Math.min(1,(r-0.4)/0.55);
      const cr = 12 + 34*cs, cy = GY - th - cr*0.4;
      const col = r>0.9 ? "#f5b8cd" : "#f0cdd9";
      body += `<circle cx="75" cy="${cy}" r="${cr}" fill="${col}"/>`;
      body += `<circle cx="${75-cr*0.75}" cy="${cy+cr*0.35}" r="${cr*0.68}" fill="${col}"/>`;
      body += `<circle cx="${75+cr*0.75}" cy="${cy+cr*0.35}" r="${cr*0.68}" fill="${col}"/>`;
      if(r>0.75){
        for(let k=0;k<10;k++){
          body += `<circle cx="${75-cr+((k*37)%(cr*2))}" cy="${cy-cr*0.3+((k*23)%cr)}" r="2.2" fill="#e88bb0"/>`;
        }
      }
    }
  }

  if(type==="momiji"){
    const th = 20 + 85*r, tw = 5 + 7*r;
    body += `<path d="M75 ${GY} L75 ${GY-th}" stroke="#7a5540" stroke-width="${tw}" stroke-linecap="round"/>`;
    if(r>0.25){
      const bs = Math.min(1,(r-0.25)/0.4);
      body += `<path d="M75 ${GY-th*0.6} Q ${75-20*bs} ${GY-th*0.7} ${75-28*bs} ${GY-th*0.86}" stroke="#7a5540" stroke-width="${tw*0.55}" fill="none" stroke-linecap="round"/>`;
      body += `<path d="M75 ${GY-th*0.5} Q ${75+20*bs} ${GY-th*0.6} ${75+26*bs} ${GY-th*0.8}" stroke="#7a5540" stroke-width="${tw*0.55}" fill="none" stroke-linecap="round"/>`;
    }
    if(r>0.4){
      const cs = Math.min(1,(r-0.4)/0.55);
      const cr = 12 + 32*cs, cy = GY - th - cr*0.4;
      const col = r>0.9 ? "#e0674a" : "#e8946a";
      body += `<circle cx="75" cy="${cy}" r="${cr}" fill="${col}"/>`;
      body += `<circle cx="${75-cr*0.72}" cy="${cy+cr*0.4}" r="${cr*0.64}" fill="#e8836a"/>`;
      body += `<circle cx="${75+cr*0.72}" cy="${cy+cr*0.4}" r="${cr*0.64}" fill="#e8a35c"/>`;
    }
  }

  if(type==="fuji"){
    const th = 18 + 74*r, tw = 5 + 6*r;
    const topY = GY - th;
    body += `<path d="M75 ${GY} L75 ${topY}" stroke="#8a6a4f" stroke-width="${tw}" stroke-linecap="round"/>`;
    if(r>0.3){
      const bs = Math.min(1,(r-0.3)/0.3);
      body += `<path d="M${75-42*bs} ${topY+4} L${75+42*bs} ${topY+2}" stroke="#8a6a4f" stroke-width="${tw*0.6}" stroke-linecap="round"/>`;
      if(r>0.5){
        const fs = Math.min(1,(r-0.5)/0.45);
        const xs2 = [75-34,75-17,75,75+17,75+34];
        xs2.forEach((x,i)=>{
          const len = (5 + 5*fs)*(1 - Math.abs(i-2)*0.12);
          for(let k=0;k<len;k++){
            const cc = k%2 ? "#ad84e8" : "#9a6ae0";
            body += `<circle cx="${x}" cy="${topY+8+k*5.5}" r="${3.6-k*0.18}" fill="${cc}"/>`;
          }
        });
      }
    }
  }

  if(type==="bigtree"){
    const th = 22 + 88*r, tw = 7 + 12*r;
    body += `<path d="M75 ${GY} L75 ${GY-th}" stroke="#7a5c40" stroke-width="${tw}" stroke-linecap="round"/>`;
    if(r>0.18){
      const cs = Math.min(1,(r-0.18)/0.75);
      const cr = 14 + 44*cs, cy = GY - th - cr*0.35;
      body += `<circle cx="75" cy="${cy}" r="${cr}" fill="#7fbb8b"/>`;
      body += `<circle cx="${75-cr*0.8}" cy="${cy+cr*0.4}" r="${cr*0.72}" fill="#8dc498"/>`;
      body += `<circle cx="${75+cr*0.8}" cy="${cy+cr*0.4}" r="${cr*0.72}" fill="#8dc498"/>`;
      if(r>0.6) body += `<circle cx="75" cy="${cy-cr*0.5}" r="${cr*0.6}" fill="#8dc498"/>`;
    }
  }

  if(type==="niji"){
    const h = 14 + 96*r, top = GY - h;
    body += _stem(75, GY, h, 4.5, "#5aa86d");
    if(r>0.22) body += _leaves(75, GY, Math.min(1,(r-0.22)/0.3));
    if(r>0.5){
      const fs = Math.min(1,(r-0.5)/0.45), fr = 6+13*fs;
      const cols = ["#e0674a","#f2b73c","#e8e05c","#7fbb8b","#4ac4e0","#8aa5e8","#ad84e8"];
      for(let k=0;k<7;k++){
        const a = -Math.PI/2 + k*Math.PI*2/7;
        body += `<ellipse cx="${75+Math.cos(a)*fr}" cy="${top+Math.sin(a)*fr}" rx="${fr*0.6}" ry="${fr*0.36}" fill="${cols[k]}" transform="rotate(${(a*180/Math.PI)+90} ${75+Math.cos(a)*fr} ${top+Math.sin(a)*fr})"/>`;
      }
      body += `<circle cx="75" cy="${top}" r="${fr*0.42}" fill="#fff"/>`;
      if(r>0.92){
        [[52,top-18],[100,top-10],[70,top-30],[94,top-26]].forEach(([sx,sy])=>{
          body += `<path d="M${sx} ${sy-4} L${sx+1.6} ${sy-1} L${sx+4.5} ${sy} L${sx+1.6} ${sy+1} L${sx} ${sy+4} L${sx-1.6} ${sy+1} L${sx-4.5} ${sy} L${sx-1.6} ${sy-1} Z" fill="#f2d03c"/>`;
        });
      }
    }
  }

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${ground}${body}</svg>`;
}

// ガチャ：なにが育つかは咲くまで分からん。まだ咲かせてない種類からだけ抽選（ダブりなし）
// 最初の3輪はかならず★1（アプリに慣れる期間）。以降はレアほど出にくい重み付き抽選。
function gachaPick(){
  const owned = new Set(garden.done.map(d=>d.type));
  let pool = PLANT_ORDER.filter(k=>!owned.has(k));
  if(pool.length===0) return null;    // 全種コンプ
  if(garden.done.length < 3){
    const easy = pool.filter(k=>PLANTS[k].rar===1);
    if(easy.length) pool = easy;      // ★1が残ってれば★1確定
  }
  const total = pool.reduce((sum,k)=>sum+RAR_W[PLANTS[k].rar], 0);
  let r = Math.random()*total;
  for(const k of pool){ r -= RAR_W[PLANTS[k].rar]; if(r<0) return k; }
  return pool[0];
}
// セッション分の成長を適用
let sessionGrowth = null;
function applyGrowth(n){
  let planted = false;
  if(!garden.type){
    const t = gachaPick();          // なにかの種がまかれる（ユーザーには秘密）
    if(!t){ sessionGrowth = { allDone:true }; return; }   // 全種コンプ
    garden.type = t;
    garden.prog = 0;
    planted = true;
  }
  const pl = PLANTS[garden.type];
  const p0 = garden.prog;
  garden.prog = Math.min(pl.total, garden.prog + n);
  const completed = garden.prog >= pl.total;
  sessionGrowth = {
    type: garden.type, planted,
    r0: p0/pl.total, r1: garden.prog/pl.total,
    grown: garden.prog - p0, completed
  };
  if(completed){
    garden.done.push({ type: garden.type, at: new Date().toISOString() });
    garden.type = null; garden.prog = 0;
  }
  saveGarden();
}
// 植物の成長アニメーション（r0→r1）
function animatePlant(el, type, r0, r1, dur=1100){
  const t0 = performance.now();
  function frame(t){
    const k = Math.min(1, (t-t0)/dur);
    const e = 1-Math.pow(1-k,3);   // easeOut
    el.innerHTML = plantSVG(type, r0 + (r1-r0)*e);
    if(k<1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* ---------- 出題（10/20/30） ---------- */
let queue = [];
let qi = 0;           // いま何枚目か
let showingBack = false;
let finished = false;

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function startStudy(n){
  if(cards.length===0){ toast("まずはカードを作ってな"); return; }
  const todos = shuffle(cards.filter(c=>c.todo));
  const rest  = shuffle(cards.filter(c=>!c.todo));
  queue = todos.concat(rest).slice(0, n);   // やること優先で最大n問
  qi = 0; showingBack = false; finished = false;
  document.getElementById("study").classList.add("show");
  renderStudy();
}
function endStudy(){
  document.getElementById("study").classList.remove("show");
  setTimeout(()=>document.getElementById("f-q").focus(), 80);
}
function confettiHTML(){
  const colors = ["#4a7de0","#2fb673","#f2b73c","#e0674a","#9a6ae0","#4ac4e0"];
  let out = "";
  for(let i=0;i<44;i++){
    const c = colors[i % colors.length];
    const left = Math.random()*100;
    const delay = Math.random()*0.9;
    const dur = 2.2 + Math.random()*1.6;
    const size = 6 + Math.random()*7;
    out += `<i style="left:${left}%;background:${c};width:${size}px;height:${size*0.6}px;animation-duration:${dur}s;animation-delay:${delay}s"></i>`;
  }
  return `<div class="confetti">${out}</div>`;
}

  const pb = el.querySelector("#plantBox");

    const pb = el.querySelector("#plantBox");

      setTimeout(()=>animatePlant(pb, g.type, g.r0, g.r1), 450);

  }
  const c = queue[qi];
  const canBack = !(qi===0 && !showingBack);
  const corner =
    `<span class="in-counter">${qi+1} / ${queue.length}</span>` +
    (canBack ? `<button class="in-back" id="inBack">←</button>` : "") +

      imgsHTML(c.aImgs) +
      searchBtnHTML(c.a) +
      `<div class="tap-note">タップで次へ</div>`;
  }
  bindSearch(el);
  const eb = document.getElementById("inEdit");
  eb.onclick = (e)=>{
    e.stopPropagation();          // カードめくりと分離
    openEdit(queue[qi].id);
  };
  const ib = document.getElementById("inBack");
  if(ib) ib.onclick = (e)=>{
    e.stopPropagation();
    if(showingBack){ showingBack = false; }          // 裏 → この表
    else if(qi > 0){ qi--; showingBack = true; }     // 表 → 前のカードの裏
    sFlip();

  };

/* ---------- 書き出し / 読み込み ---------- */
function exportJSON(){
  const data = {
    app: "omoidashi-cards",
    version: 2,
    exportedAt: new Date().toISOString(),
    cards: cards
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const ts = new Date();
  const pad = n=>String(n).padStart(2,"0");
  const name = `omoidashi-${ts.getFullYear()}${pad(ts.getMonth()+1)}${pad(ts.getDate())}-${pad(ts.getHours())}${pad(ts.getMinutes())}.json`;
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast("書き出したで");
}
function importJSON(file){
  const reader = new FileReader();
  reader.onload = async ()=>{
    let parsed;
    try{ parsed = JSON.parse(reader.result); }
    catch(e){ toast("読み込めませんでした（JSON不正）"); return; }
    const incoming = Array.isArray(parsed) ? parsed : parsed.cards;
    if(!Array.isArray(incoming)){ toast("カードデータが見つかりません"); return; }
    const clean = incoming
      .filter(c => c && (typeof c.q==="string" || typeof c.a==="string" || Array.isArray(c.qImgs) || Array.isArray(c.aImgs)))
      .map(normalizeCard);
    if(clean.length===0){ toast("有効なカードがありません"); return; }
    const ok = confirm(
      `${clean.length}枚のカードを読み込みます。\n\n` +
      `現在の ${cards.length}枚 をすべて置き換えます。\n` +
      `この操作は元に戻せません。よろしいですか？`
    );
    if(!ok){ toast("読み込みを中止したで"); return; }
    cards = clean;
    await save();
    renderList();
    updateStoreStat();
    switchView("list");
    toast(`${clean.length}枚を読み込んだで`);
  };
  reader.onerror = ()=>toast("ファイルを読めませんでした");
  reader.readAsText(file);
}
function updateStoreStat(){
  const el = document.getElementById("storeStat");
  if(!el) return;
  const todos = cards.filter(c=>c.todo).length;
  el.textContent = `現在 ${cards.length}枚（うち やること ${todos}枚）`;
}

  e.target.value="";
};
document.getElementById("aImgInput").onchange=(e)=>{
  if(e.target.files&&e.target.files.length) handleImageFiles(e.target.files, formAImgs, renderCreateThumbs);
  e.target.value="";
};
document.getElementById("eqImgBtn").onclick=()=>document.getElementById("eqImgInput").click();
document.getElementById("eaImgBtn").onclick=()=>document.getElementById("eaImgInput").click();
document.getElementById("eqImgInput").onchange=(e)=>{
  if(e.target.files&&e.target.files.length) handleImageFiles(e.target.files, editQImgs, renderEditThumbs);
  e.target.value="";
};
document.getElementById("eaImgInput").onchange=(e)=>{
  if(e.target.files&&e.target.files.length) handleImageFiles(e.target.files, editAImgs, renderEditThumbs);
  e.target.value="";
};

document.getElementById("exportBtn").onclick=exportJSON;
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange=(e)=>{
  const f=e.target.files&&e.target.files[0];
  if(f) importJSON(f);
  e.target.value="";
};

bootData().then(()=>{
  updateStoreStat();
  // 起動即・入力できる状態へ
  document.getElementById("f-q").focus();
}).catch(()=>{
  toast("データの読み込みに失敗しました");
});
registerSW();
</script>
</body>
</html>
